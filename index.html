<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>كلية القانون - نظام الاختبارات الذكي</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========== CSS ROOT & THEMES ========== */
        :root {
            --primary: #2C3E50;
            --secondary: #3498DB;
            --accent: #7F8C8D;
            --success: #27AE60;
            --warning: #F39C12;
            --danger: #E74C3C;
            --dark: #1A252F;
            --light: #ECF0F1;
            --glass: rgba(255, 255, 255, 0.05);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --card-bg: linear-gradient(145deg, rgba(44, 62, 80, 0.95), rgba(26, 37, 47, 0.95));
            --glow: 0 0 15px rgba(52, 152, 219, 0.2);
            --incorrect: #FFA500;
            --premium-gold: #D4AF37;
            --premium-bg: linear-gradient(145deg, #1a0a2e, #2d0a4e);
            --premium-accent: #9b59b6;
        }

        .premium-user .card {
            background: var(--premium-bg) !important;
            border: 1px solid var(--premium-gold) !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3) !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 50%, var(--accent) 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 800px; padding: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            position: relative;
            width: 100%;
        }

        /* Login View UI */
        #mainPlatform.on-login-screen .card {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('./images/login-bg-full.png') center center/cover no-repeat !important;
            padding: 40px 20px !important;
        }

        .screen { display: none !important; width: 100%; }
        .screen.active { display: block !important; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Inputs & Buttons */
        input[type="text"], select {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            background: rgba(44, 62, 80, 0.7);
            color: var(--light);
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: var(--glow); }

        /* Subject Selector */
        .subject-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .subject-btn {
            background: rgba(44, 62, 80, 0.7);
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .subject-btn.active { border-color: var(--secondary); background: var(--secondary); }

        /* AI Chat Window */
        #aiChatWindow {
            height: 400px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Arabic text utility */
        .arabic-text { direction: rtl; text-align: right; font-family: 'Cairo', sans-serif; }

        .designer-credit {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="mainPlatform" class="on-login-screen">
        <div class="container">
            <div class="card">
                <!-- LOGIN SCREEN -->
                <div id="loginScreen" class="screen active">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <img src="images/login-bg-full.png" alt="Logo" style="width: 100px; border-radius: 50%; border: 3px solid var(--secondary);">
                        <h2 class="arabic-text">تسجيل الدخول</h2>
                    </div>
                    <input type="text" id="username" placeholder="أدخل اسمك الكامل أو كود الأدمن">
                    <button id="loginBtn" class="btn"><i class="fas fa-sign-in-alt"></i> دخول</button>
                    <div id="loginError" style="color: var(--danger); text-align: center; margin-top: 10px; display: none;"></div>
                </div>

                <!-- SUBJECT SELECTION -->
                <div id="subjectScreen" class="screen">
                    <h3 class="arabic-text">مرحباً، <span id="userNameSubject"></span></h3>
                    <div class="subject-selector" id="subjectSelector">
                        <div class="subject-btn active" data-subject="obligations">أحكام الالتزام</div>
                        <div class="subject-btn" data-subject="evidence">قانون الإثبات</div>
                        <div class="subject-btn" data-subject="eu_law">قانون الاتحاد الأوروبي</div>
                        <div class="subject-btn" data-subject="banking">البنوك والنقود</div>
                        <div class="subject-btn" data-subject="political_science">مدخل للعلوم السياسية</div>
                        <div class="subject-btn" data-subject="research">مهارات البحث والتحليل</div>
                        <div class="subject-btn" data-subject="admin_law">القانون الإداري</div>
                    </div>
                    <button onclick="selectSubject()" class="btn">متابعة <i class="fas fa-arrow-left"></i></button>
                    <button id="aiAssistantBtn" class="btn" style="display:none; margin-top:10px; background: var(--premium-bg);">الذكاء الاصطناعي <i class="fas fa-robot"></i></button>
                    <button onclick="window.location.reload()" class="btn" style="margin-top:10px; background: var(--accent);">خروج</button>
                </div>

                <!-- EXAM SCREEN (QUIZ) -->
                <div id="quizScreen" class="screen">
                    <div id="quizContent">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span id="quizTitle"></span>
                            <span id="questionNumber"></span>
                        </div>
                        <div id="questionText" class="arabic-text" style="font-size:1.2rem; margin-bottom:20px; padding:15px; background:rgba(255,255,255,0.05); border-radius:10px;"></div>
                        <div id="optionsContainer" class="subject-selector" style="grid-template-columns:1fr;"></div>
                        <div style="display:flex; gap:10px; margin-top:20px;">
                            <button id="prevBtn" class="btn" style="flex:1;">السابق</button>
                            <button id="nextBtn" class="btn" style="flex:1;">التالي</button>
                        </div>
                    </div>
                    <div id="resultsSummary" style="display:none; text-align:center;">
                        <h2>النتيجة: <span id="scoreDisplay"></span></h2>
                        <button onclick="showScreen('subjectScreen')" class="btn">العودة للرئيسية</button>
                    </div>
                </div>

                <!-- ADMIN PANEL -->
                <div id="adminScreen" class="screen">
                    <h2 class="arabic-text">لوحة التحكم</h2>
                    <input type="text" id="newPremiumUser" placeholder="اسم المستخدم المميز">
                    <button onclick="addPremiumUser()" class="btn">إضافة مميز</button>
                    <div id="premiumUsersList" style="margin-top:20px;"></div>
                    <button onclick="showScreen('loginScreen')" class="btn" style="margin-top:20px; background:var(--danger);">تسجيل خروج</button>
                </div>

                <!-- AI ASSISTANT -->
                <div id="aiScreen" class="screen">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <button onclick="showScreen('subjectScreen')" class="btn" style="width:auto;">عودة</button>
                        <button onclick="createNewChat()" class="btn" style="width:auto;">محادثة جديدة</button>
                    </div>
                    <div id="aiChatWindow"></div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <select id="aiModelSelect" style="width:auto; margin-bottom:0;">
                            <option value="gemini">Gemini 2.5 Flash</option>
                            <option value="groq">Groq (Llama 3.1 Instant)</option>
                        </select>
                        <input type="text" id="aiInput" placeholder="اسأل أي سؤال..." style="margin-bottom:0;">
                        <button onclick="sendAIChat()" class="btn" style="width:auto;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <div class="designer-credit">By Mohamed Nasser</div>
            </div>
        </div>
    </div>

    <script>
        const GEMINI_KEY = "AIzaSyAOSK7mDYvmpdHmh3fEFv_z1hGjopbyay8";
        const GROQ_KEY = "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";

        let currentUser = null;
        let currentSubject = "obligations";
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let currentChatMessages = [];
        let shuffledQuestions = {};

        const examData = {
            obligations: { quiz1: { title: "امتحان أحكام الالتزام", questions: [] } },
            evidence: { 
                quiz1: { title: "Evidence Intro", questions: [] },
                quiz2: { title: "Evidence Subject", questions: [] }
            },
            eu_law: { quiz1: { title: "EU Law Quiz", questions: [] } },
            banking: { quiz1: { title: "البنوك والنقود - امتحان 1", questions: [] } },
            political_science: { quiz1: { title: "العلوم السياسية - الامتحان الشامل", questions: [] } },
            research: { quiz1: { title: "مهارات البحث - امتحان 1", questions: [] } },
            admin_law: { quiz1: { title: "Administrative Law Exam", questions: [] } }
        };

        function loadAllQuestions() {
            // أحكام الالتزام - بنك كامل
            examData.obligations.quiz1.questions = [
                { text: "إذا كان محل الالتزام شيئاً معيناً بالنوع، تنتقل الملكية بمجرد إبرام العقد", type: "truefalse", options: ["صح", "خطأ"], correctAnswer: 1 },
                { text: "يجوز للدائن في حالة امتناع المدين عن تسليم شيء معين بالنوع الحصول على شيء مماثل من السوق على نفقة المدين", type: "truefalse", options: ["صح", "خطأ"], correctAnswer: 0 },
                { text: "الأصل أن التزام المحامي في الدفاع عن موكله يُعدّ التزاماً بتحقيق نتيجة", type: "truefalse", options: ["صح", "خطأ"], correctAnswer: 1 },
                { text: "تنتقل ملكية الشيء المعين بالذات بمجرد انعقاد العقد دون الحاجة إلى الإفراز.", type: "truefalse", options: ["صح", "خطأ"], correctAnswer: 0 },
                { text: "يُعَرَّف بأن جميع أموال المدين ضامنة للوفاء بديونه:", type: "multiple", options: ["الحق في الحبس", "الضمان الخاص", "الضمان العام", "الإفلاس"], correctAnswer: 2 }
            ];
            // قانون الإثبات
            examData.evidence.questions = [
                { text: "Evidence is only concerned with proving facts that have legal effect in court.", type: "truefalse", options: ["True", "False"], correctAnswer: 0 },
                { text: "What is the main function of evidence in court?", type: "multiple", options: ["To provide opinions.", "To provide proof of the existence of a legal fact.", "To confuse the parties."], correctAnswer: 1 }
            ];
            // القانون الإداري
            examData.admin_law.questions = [
                { text: "Administrative law is a branch of private law that regulates contracts between individuals.", type: "truefalse", options: ["True", "False"], correctAnswer: 1 },
                { text: "In Egypt, the 2014 Constitution distributes power between central and decentralized authorities.", type: "truefalse", options: ["True", "False"], correctAnswer: 0 }
            ];
            // قانون الاتحاد الأوروبي
            examData.eu_law.questions = [
                { text: "The European Union was established when Maastricht Treaty Came into force in 1993.", type: "multiple", options: ["Geneva", "Maastricht", "Lisbon"], correctAnswer: 1 }
            ];
            // مدخل للعلوم السياسية
            examData.political_science.questions = [
                { text: "Aristo said: 'Man is by nature a political animal.'", type: "truefalse", options: ["True", "False"], correctAnswer: 0 }
            ];
        }

        window.handleLogin = function() {
            const user = document.getElementById('username').value.trim();
            if (user === "060319") {
                showScreen('adminScreen');
                loadPremiumUsersList();
                return;
            }
            if (user.length < 3) {
                alert("الاسم قصير جداً");
                return;
            }
            currentUser = user;
            document.getElementById('userNameSubject').textContent = user;
            
            const premium = JSON.parse(localStorage.getItem('premiumUsers') || '[]');
            if (premium.includes(user)) {
                document.body.classList.add('premium-user');
                document.getElementById('aiAssistantBtn').style.display = "flex";
            }
            
            showScreen('subjectScreen');
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const platform = document.getElementById('mainPlatform');
            id === 'loginScreen' ? platform.classList.add('on-login-screen') : platform.classList.remove('on-login-screen');
        }

        function selectSubject() {
            currentSubject = document.querySelector('.subject-btn.active').dataset.subject;
            const exams = examData[currentSubject];
            if (!exams || Object.keys(exams).length === 0) {
                alert("هذه المادة ستتوفر قريباً");
                return;
            }
            
            // بدلاً من الدخول للامتحان مباشرة، ننتقل لاختيار رقم الامتحان
            currentQuiz = Object.keys(exams)[0]; 
            currentQuestionIndex = 0;
            userAnswers = {};
            loadQuestion();
            showScreen('quizScreen');
        }

        function loadQuestion() {
            const questions = examData[currentSubject][currentQuiz].questions;
            if (!questions || questions.length === 0) {
                alert("لا توجد أسئلة حالياً لهذا الامتحان");
                showScreen('subjectScreen');
                return;
            }
            
            const q = questions[currentQuestionIndex];
            document.getElementById('quizTitle').textContent = examData[currentSubject][currentQuiz].title;
            document.getElementById('questionNumber').textContent = `سؤال ${currentQuestionIndex + 1} من ${questions.length}`;
            document.getElementById('questionText').textContent = q.text;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = `subject-btn ${userAnswers[currentQuestionIndex] === i ? 'active' : ''}`;
                btn.textContent = opt;
                btn.onclick = () => {
                    userAnswers[currentQuestionIndex] = i;
                    loadQuestion();
                };
                container.appendChild(btn);
            });
        }

        document.getElementById('prevBtn').onclick = () => {
            if (currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(); }
        };

        document.getElementById('nextBtn').onclick = () => {
            const questions = examData[currentSubject][currentQuiz].questions;
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            const questions = examData[currentSubject][currentQuiz].questions;
            let correct = 0;
            questions.forEach((q, i) => {
                if (userAnswers[i] === q.correctAnswer) correct++;
            });
            document.getElementById('quizContent').style.display = "none";
            document.getElementById('resultsSummary').style.display = "block";
            document.getElementById('scoreDisplay').textContent = `${correct} / ${questions.length}`;
        }

        // دالة لتنسيق رد الـ AI بشكل منظم
        function formatAIResponse(text) {
            if (!text) return "";
            let formatted = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/(\d+\.\s)/g, '<br><strong style="color:var(--premium-gold)">$1</strong>');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        window.createNewChat = function() {
            currentChatMessages = [];
            document.getElementById('aiChatWindow').innerHTML = '<div style="background: var(--premium-accent); padding: 10px; border-radius: 10px; align-self: flex-start;">بدأت محادثة جديدة. كيف يمكنني مساعدتك؟</div>';
        };

        // AI Functions
        window.sendAIChat = async function() {
            const input = document.getElementById('aiInput');
            const text = input.value.trim();
            if (!text) return;
            
            const chatWin = document.getElementById('aiChatWindow');
            chatWin.innerHTML += `<div style="align-self:flex-end; background:rgba(255,255,255,0.1); padding:10px; border-radius:10px; max-width:80%; word-wrap:break-word;">${text}</div>`;
            input.value = "";
            
            currentChatMessages.push({ role: "user", content: text });

            const model = document.getElementById('aiModelSelect').value;
            const loading = document.createElement('div');
            loading.style.cssText = "background: var(--premium-accent); padding: 15px; border-radius: 10px; align-self: flex-start; max-width: 90%; line-height: 1.6; direction: rtl;";
            loading.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التفكير...';
            chatWin.appendChild(loading);
            chatWin.scrollTop = chatWin.scrollHeight;

            try {
                let response;
                if (model === 'gemini') {
                    // تحديث الرابط والنموذج لضمان الاستقرار
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
                    
                    // التأكد من أن المصفوفة تحتوي على بيانات قبل الإرسال
                    const historyPayload = currentChatMessages.length > 0 ? currentChatMessages.map(m => ({
                        role: m.role === 'user' ? 'user' : 'model',
                        parts: [{ text: m.content }]
                    })) : [{ role: 'user', parts: [{ text: text }] }];

                    console.log("Gemini Request Payload:", JSON.stringify({ contents: historyPayload })); 

                    response = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: historyPayload })
                    });
                } else {
                    // إضافة منطق Groq الذي كان مفقوداً في index.html
                    response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${GROQ_KEY}`
                        },
                        body: JSON.stringify({
                            model: "llama-3.1-8b-instant", // Updated Groq model
                            messages: currentChatMessages.map(m => ({ role: m.role, content: m.content })),
                            stream: false
                        })
                    });
                }

                if (!response.ok) {
                    const errBody = await response.json();
                    throw new Error(errBody.error?.message || "خطأ في الاستجابة");
                }

                const data = await response.json();
                let aiText = "";
                
                if (model === 'gemini') {
                    aiText = data.candidates[0].content.parts[0].text;
                } else {
                    aiText = data.choices[0].message.content;
                }

                currentChatMessages.push({ role: "model", content: aiText });
                loading.innerHTML = formatAIResponse(aiText);

            } catch (e) {
                console.error(e);
                loading.style.background = "var(--danger)";
                loading.textContent = "خطأ: " + e.message;
            }
            chatWin.scrollTop = chatWin.scrollHeight;
        };

        function addPremiumUser() {
            const name = document.getElementById('newPremiumUser').value.trim();
            let premium = JSON.parse(localStorage.getItem('premiumUsers') || '[]');
            if (!premium.includes(name)) premium.push(name);
            localStorage.setItem('premiumUsers', JSON.stringify(premium));
            loadPremiumUsersList();
        }

        function loadPremiumUsersList() {
            const premium = JSON.parse(localStorage.getItem('premiumUsers') || '[]');
            document.getElementById('premiumUsersList').innerHTML = premium.map(u => 
                `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${u}</span> <button onclick="removePremium('${u}')">حذف</button></div>`
            ).join('');
        }

        function removePremium(name) {
            let premium = JSON.parse(localStorage.getItem('premiumUsers') || '[]').filter(u => u !== name);
            localStorage.setItem('premiumUsers', JSON.stringify(premium));
            loadPremiumUsersList();
        }

        loadAllQuestions();
        document.getElementById('loginBtn').onclick = window.handleLogin;
        document.getElementById('aiAssistantBtn').onclick = () => showScreen('aiScreen');
        
        document.querySelectorAll('.subject-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            }
        });
    </script>
</body>
</html>
